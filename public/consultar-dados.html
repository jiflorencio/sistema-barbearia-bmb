<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultar Dados - Sistema Barbearia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            color: white;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-info h1 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .header-info p {
            opacity: 0.9;
            font-size: 1em;
        }

        .btn-back {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-back:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        .main-content {
            padding: 30px;
        }

        .stats-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: linear-gradient(135deg, #f8f9fa, #ffffff);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-left: 4px solid #667eea;
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .stat-label {
            color: #6c757d;
            font-size: 0.9em;
        }

        .search-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            border-left: 5px solid #28a745;
        }

        .search-section h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.3em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-controls {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            padding: 15px 20px;
            border: 2px solid #e1e5e9;
            border-radius: 25px;
            font-size: 16px;
            transition: all 0.3s;
            background: white;
        }

        .search-box:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .filter-unidade {
            padding: 15px 20px;
            border: 2px solid #e1e5e9;
            border-radius: 25px;
            font-size: 16px;
            transition: all 0.3s;
            background: white;
            cursor: pointer;
            min-width: 150px;
        }

        .filter-unidade:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .filter-unidade:hover {
            border-color: #667eea;
        }

        .filter-label {
            color: #6c757d;
            font-size: 14px;
            margin-right: 8px;
            font-weight: 500;
        }

        .clients-section {
            background: #ffffff;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .clients-section h2 {
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 1.3em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ===== NOVA SEÇÃO DE CONTROLES ===== */
        .controls-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .selection-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .select-all {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            color: #2c3e50;
        }

        .btn-delete-selected {
            background: linear-gradient(135deg, #dc3545, #c82333);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            opacity: 0.5;
            pointer-events: none;
        }

        .btn-delete-selected.active {
            opacity: 1;
            pointer-events: auto;
        }

        .btn-delete-selected:hover.active {
            background: linear-gradient(135deg, #c82333, #a71e2a);
            transform: translateY(-1px);
        }

        .selected-count {
            color: #667eea;
            font-weight: 600;
        }

        /* ===== NOVA TABELA DE CLIENTES ===== */
        .clients-table-container {
            overflow-x: auto;
            border-radius: 10px;
            border: 1px solid #e9ecef;
        }

        .clients-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        .clients-table th {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px 12px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
            border: none;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .clients-table th:first-child {
            width: 50px;
            text-align: center;
        }

        .clients-table td {
            padding: 15px 12px;
            border-bottom: 1px solid #e9ecef;
            vertical-align: middle;
        }

        .clients-table tr:hover {
            background-color: #f8f9fa;
        }

        .clients-table tr:last-child td {
            border-bottom: none;
        }

        .client-name {
            font-weight: 600;
            color: #2c3e50;
            cursor: pointer;
            transition: color 0.3s;
        }

        .client-name:hover {
            color: #667eea;
            text-decoration: underline;
        }

        .client-phone {
            color: #6c757d;
            font-family: 'Courier New', monospace;
        }

        .client-date {
            color: #6c757d;
            font-size: 14px;
        }

        .client-unidade {
            color: #495057;
            font-weight: 500;
            font-size: 14px;
        }

        .client-unidade.vazio {
            color: #adb5bd;
            font-style: italic;
        }

        .checkbox-cell {
            text-align: center;
            width: 50px;
        }

        .client-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .no-clients {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }

        .no-clients-icon {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }

        .alert {
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 10px;
            font-weight: 500;
        }

        .alert-success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .alert-error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        @media (max-width: 768px) {
            .container {
                margin: 10px;
                border-radius: 10px;
            }
            
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            
            .main-content {
                padding: 20px;
            }
            
            .stats-section {
                grid-template-columns: 1fr;
            }

            .controls-section {
                flex-direction: column;
                gap: 15px;
                align-items: stretch;
            }

            .search-controls {
                flex-direction: column;
                align-items: stretch;
            }

            .search-box,
            .filter-unidade {
                width: 100%;
            }

            .clients-table {
                font-size: 14px;
            }

            .clients-table th,
            .clients-table td {
                padding: 10px 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-info">
                <h1>🔍 Consultar Banco de Dados</h1>
                <p>Visualize e gerencie todos os clientes</p>
            </div>
            <a href="/dashboard" class="btn-back">
                ← Voltar ao Dashboard
            </a>
        </div>

        <div class="main-content">
            <div id="alerts"></div>

            <!-- Estatísticas -->
            <div class="stats-section">
                <div class="stat-card">
                    <div class="stat-number" id="totalClientes">-</div>
                    <div class="stat-label">Total de Clientes Cadastrados</div>
                </div>
            </div>

            <!-- Busca -->
            <div class="search-section">
                <h2>🔎 Buscar Clientes</h2>
                <div class="search-controls">
                    <input type="text" class="search-box" id="searchBox" 
                           placeholder="Digite o nome ou telefone do cliente...">
                    
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <span class="filter-label">Filtrar por:</span>
                        <select class="filter-unidade" id="unidadeFilter">
                            <option value="">Todas as Unidades</option>
                            <option value="JSP">JSP - Jardim São Paulo</option>
                            <option value="sem-unidade">Sem Unidade</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Lista de Clientes -->
            <div class="clients-section">
                <h2>👥 Clientes Cadastrados</h2>
                
                <!-- Controles de Seleção -->
                <div class="controls-section">
                    <div class="selection-controls">
                        <label class="select-all">
                            <input type="checkbox" id="selectAll"> 
                            Selecionar Todos
                        </label>
                        <span class="selected-count" id="selectedCount">0 selecionados</span>
                    </div>
                    <button class="btn-delete-selected" id="deleteSelectedBtn" onclick="deletarSelecionados()">
                        🗑️ Excluir Selecionados
                    </button>
                </div>

                <!-- Tabela de Clientes -->
                <div class="clients-table-container">
                    <table class="clients-table" id="clientesTable">
                        <thead>
                            <tr>
                                <th>☐</th>
                                <th>Nome</th>
                                <th>Telefone</th>
                                <th>Data de Nascimento</th>
                                <th>Data de Cadastro</th>
                                <th>Unidade</th>
                            </tr>
                        </thead>
                        <tbody id="clientesTableBody">
                            <tr>
                                <td colspan="6" class="loading">
                                    🔄 Carregando clientes...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let clientes = [];
        let clientesFiltrados = [];
        let clientesSelecionados = new Set();

        // Carregar dados ao iniciar
        document.addEventListener('DOMContentLoaded', function() {
            verificarAutenticacao();
            carregarClientes();
            configurarEventListeners();
        });

        // Configurar event listeners
        function configurarEventListeners() {
            // Busca
            document.getElementById('searchBox').addEventListener('input', function() {
                aplicarFiltros();
            });

            // Filtro de unidade
            document.getElementById('unidadeFilter').addEventListener('change', function() {
                aplicarFiltros();
            });

            // Selecionar todos
            document.getElementById('selectAll').addEventListener('change', function() {
                const checkboxes = document.querySelectorAll('.client-checkbox');
                checkboxes.forEach(checkbox => {
                    checkbox.checked = this.checked;
                    const clienteId = checkbox.dataset.clienteId;
                    if (this.checked) {
                        clientesSelecionados.add(clienteId);
                    } else {
                        clientesSelecionados.delete(clienteId);
                    }
                });
                atualizarContadorSelecao();
            });
        }

        // Verificar autenticação
        async function verificarAutenticacao() {
            try {
                const response = await fetch('/api/auth-status');
                const data = await response.json();
                
                if (!data.logado) {
                    window.location.href = '/';
                    return;
                }
            } catch (error) {
                console.error('Erro ao verificar autenticação:', error);
                window.location.href = '/';
            }
        }

        // Função para mostrar alertas
        function mostrarAlert(mensagem, tipo = 'success') {
            const alertsContainer = document.getElementById('alerts');
            const alert = document.createElement('div');
            alert.className = `alert alert-${tipo}`;
            alert.textContent = mensagem;
            
            alertsContainer.appendChild(alert);
            
            setTimeout(() => {
                alert.remove();
            }, 5000);
        }

        // Carregar todos os clientes
        async function carregarClientes() {
            try {
                const response = await fetch('/api/clientes');
                
                if (response.status === 401) {
                    window.location.href = '/';
                    return;
                }
                
                clientes = await response.json();
                clientesFiltrados = [...clientes];
                renderizarClientes(clientesFiltrados);
                atualizarEstatisticas();
                carregarUnidadesUnicas();
            } catch (error) {
                mostrarAlert('Erro ao carregar clientes', 'error');
                console.error('Erro:', error);
                document.getElementById('clientesTableBody').innerHTML = 
                    '<tr><td colspan="6" class="no-clients"><div class="no-clients-icon">❌</div><h3>Erro ao carregar dados</h3><p>Tente recarregar a página</p></td></tr>';
            }
        }

        // Carregar unidades únicas para o filtro
        function carregarUnidadesUnicas() {
            const unidadesSet = new Set();
            clientes.forEach(cliente => {
                if (cliente.unidade) {
                    unidadesSet.add(cliente.unidade);
                }
            });
            
            // Se houver outras unidades além de JSP, adicionar ao select
            const unidadeFilter = document.getElementById('unidadeFilter');
            unidadesSet.forEach(unidade => {
                if (unidade !== 'JSP') {
                    const option = document.createElement('option');
                    option.value = unidade;
                    option.textContent = unidade;
                    unidadeFilter.appendChild(option);
                }
            });
        }

        // Aplicar filtros
        function aplicarFiltros() {
            const termo = document.getElementById('searchBox').value.toLowerCase();
            const unidadeFiltro = document.getElementById('unidadeFilter').value;
            
            clientesFiltrados = clientes.filter(cliente => {
                // Filtro de busca
                const matchBusca = termo === '' || 
                    cliente.nome.toLowerCase().includes(termo) ||
                    cliente.telefone.includes(termo);
                
                // Filtro de unidade
                let matchUnidade = true;
                if (unidadeFiltro !== '') {
                    if (unidadeFiltro === 'sem-unidade') {
                        matchUnidade = !cliente.unidade || cliente.unidade === '';
                    } else {
                        matchUnidade = cliente.unidade === unidadeFiltro;
                    }
                }
                
                return matchBusca && matchUnidade;
            });
            
            renderizarClientes(clientesFiltrados);
        }

        // Renderizar clientes na tabela
        function renderizarClientes(clientesParaRenderizar) {
            const tbody = document.getElementById('clientesTableBody');
            
            if (clientesParaRenderizar.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="no-clients">
                            <div class="no-clients-icon">👥</div>
                            <h3>Nenhum cliente encontrado</h3>
                            <p>Tente ajustar os filtros ou adicione clientes através da página "Atualizar Banco de Dados"</p>
                        </td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = clientesParaRenderizar.map(cliente => `
                <tr>
                    <td class="checkbox-cell">
                        <input type="checkbox" class="client-checkbox" 
                               data-cliente-id="${cliente._id}" 
                               onchange="toggleClienteSelecao('${cliente._id}')">
                    </td>
                    <td>
                        <div class="client-name" onclick="verDetalhes('${cliente._id}')">
                            ${cliente.nome}
                        </div>
                    </td>
                    <td>
                        <div class="client-phone">
                            ${cliente.ddi || '+55'} ${cliente.telefone}
                        </div>
                    </td>
                    <td>
                        <div class="client-date">
                            ${cliente.dataNascimento ? new Date(cliente.dataNascimento).toLocaleDateString('pt-BR') : 'Não Informado'}
                        </div>
                    </td>
                    <td>
                        <div class="client-date">
                            ${new Date(cliente.criadoEm).toLocaleDateString('pt-BR')}
                        </div>
                    </td>
                    <td>
                        <div class="client-unidade ${!cliente.unidade ? 'vazio' : ''}">
                            ${cliente.unidade || '-'}
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // Atualizar estatísticas
        function atualizarEstatisticas() {
            document.getElementById('totalClientes').textContent = clientes.length;
        }

        // Toggle seleção de cliente
        function toggleClienteSelecao(clienteId) {
            if (clientesSelecionados.has(clienteId)) {
                clientesSelecionados.delete(clienteId);
            } else {
                clientesSelecionados.add(clienteId);
            }
            atualizarContadorSelecao();
        }

        // Atualizar contador de seleção
        function atualizarContadorSelecao() {
            const count = clientesSelecionados.size;
            const countElement = document.getElementById('selectedCount');
            const deleteBtn = document.getElementById('deleteSelectedBtn');
            const selectAllCheckbox = document.getElementById('selectAll');
            
            countElement.textContent = `${count} selecionado${count !== 1 ? 's' : ''}`;
            
            if (count > 0) {
                deleteBtn.classList.add('active');
            } else {
                deleteBtn.classList.remove('active');
            }

            // Atualizar checkbox "Selecionar Todos"
            const totalCheckboxes = document.querySelectorAll('.client-checkbox').length;
            selectAllCheckbox.indeterminate = count > 0 && count < totalCheckboxes;
            selectAllCheckbox.checked = count === totalCheckboxes && count > 0;
        }

        // Ver detalhes do cliente
        function verDetalhes(clienteId) {
            window.location.href = `/cliente-detalhes?id=${clienteId}`;
        }

        // Deletar clientes selecionados
        async function deletarSelecionados() {
            if (clientesSelecionados.size === 0) return;
            
            const count = clientesSelecionados.size;
            if (!confirm(`Tem certeza que deseja excluir ${count} cliente${count !== 1 ? 's' : ''} selecionado${count !== 1 ? 's' : ''}?\n\nEsta ação não pode ser desfeita.`)) {
                return;
            }
            
            try {
                let sucessos = 0;
                let erros = 0;
                
                for (const clienteId of clientesSelecionados) {
                    try {
                        const response = await fetch(`/api/clientes/${clienteId}`, {
                            method: 'DELETE'
                        });
                        
                        if (response.ok) {
                            sucessos++;
                        } else {
                            erros++;
                        }
                    } catch (error) {
                        erros++;
                    }
                }
                
                if (sucessos > 0) {
                    mostrarAlert(`✅ ${sucessos} cliente${sucessos !== 1 ? 's' : ''} excluído${sucessos !== 1 ? 's' : ''} com sucesso!`);
                }
                
                if (erros > 0) {
                    mostrarAlert(`⚠️ ${erros} erro${erros !== 1 ? 's' : ''} ao excluir cliente${erros !== 1 ? 's' : ''}`, 'error');
                }
                
                // Limpar seleções e recarregar
                clientesSelecionados.clear();
                carregarClientes();
                
            } catch (error) {
                mostrarAlert('Erro de conexão', 'error');
                console.error('Erro:', error);
            }
        }
    </script>
</body>
</html>
